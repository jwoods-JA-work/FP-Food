<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagging Rush</title>
    <link href="https://fonts.googleapis.com/css?family=Wendy+One" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-directions-overlay">
        <div class="directions-popup">
            <h1>Bagging Rush!</h1>
            <ul class="mission-list">
                <li>Items are sliding down the chute!</li>
                <li>Tap the <b>MATCHING COLOR</b> bag to pack the item.</li>
                <li>Red Wrapper ➔ Red Bag, etc.</li>
                <li>Don't let items fall off the edge!</li>
            </ul>
            <button id="start-minigame-btn" onclick="beginBaggingGame()">START BAGGING!</button>
        </div>
    </div>

    <div id="bagging-game-screen">
        <div class="game-header">
            <h2>Items Sorted: <span id="items-bagged">0</span>/10</h2>
            <h2>Budget: $<span id="game-budget">60</span></h2>
        </div>

        <div id="kitchen-chute">
            <div id="chute-item">🍔</div>
        </div>

        <div id="bagging-zone">
            <button class="bag red-bag" onclick="checkBag('red')">🛍️<br>RED</button>
            <button class="bag blue-bag" onclick="checkBag('blue')">🛍️<br>BLUE</button>
            <button class="bag yellow-bag" onclick="checkBag('yellow')">🛍️<br>YELLOW</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
