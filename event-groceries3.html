<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Sort</title>

    <link href="https://fonts.googleapis.com/css?family=Wendy+One" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allan&family=Sanchez&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-directions-overlay">
        <div class="directions-popup">
            <h1>Checkout Sorting!</h1>
            <ul class="mission-list">
                <li>Items are sliding down the belt!</li>
                <li>Tap <b>KEEP ✅</b> for healthy needs (🥦, 🍎, 🥚).</li>
                <li>Tap <b>TOSS ❌</b> for junk/impulse buys (🍩, 🍬, 🥤).</li>
                <li>Don't let any junk reach the grocery bag!</li>
            </ul>
            <button id="start-minigame-btn" onclick="beginSortGame()">START SORTING!</button>
        </div>
    </div>

    <div id="sort-game-screen">
        <div class="game-header">
            <h2>Items Left: <span id="items-count">10</span></h2>
            <h2>Budget: $<span id="game-budget">60</span></h2>
        </div>

        <div id="conveyor-container">
            <div id="conveyor-belt"></div>
            <div id="grocery-bag-goal">🛍️</div>
            <div id="moving-item"></div>
        </div>

        <div class="sort-controls">
            <button class="sort-btn keep" onclick="handleSort('keep')">KEEP ✅</button>
            <button class="sort-btn toss" onclick="handleSort('toss')">TOSS ❌</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
