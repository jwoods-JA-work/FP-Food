<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Aisle Dodger</title>

    <link href="https://fonts.googleapis.com/css?family=Wendy+One" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allan&family=Sanchez&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="dodger-game-screen">
        
        <div class="game-header">
            <h2>Time: <span id="game-time">20</span>s</h2>
            <h2>Budget: $<span id="game-budget">60</span></h2>
        </div>

        <div id="game-board">
            <div id="player-cart">🛒</div>
        </div>

        <div class="prompt-box" style="margin-top: 20px; width: 400px; padding: 15px;">
            <p style="font-size: 18px;">
                <b>DRAG THE CART!</b><br> 
                Catch Good Deals (🥦 🍎) to save <b>$1</b>.<br> 
                Dodge Impulse Buys (🍫 🍩) or lose <b>$2</b>!
            </p>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
