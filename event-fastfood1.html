<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive-Thru Toss</title>

    <link href="https://fonts.googleapis.com/css?family=Wendy+One" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allan&family=Sanchez&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="fastfood-game-screen">
        
        <div class="game-header">
            <h2>Fast Food Rush!</h2>
            <h2>Budget: $<span id="game-budget">60</span></h2>
        </div>

        <div class="prompt-box" style="margin-top: 10px; margin-bottom: 20px; width: 500px; padding: 15px;">
            <p style="font-size: 18px;">
                <b>THE DRIVE-THRU TOSS!</b><br> 
                Time your throw perfectly. Land the bag in the open car window for a <b>$5 tip</b>. Miss, and pay <b>$5</b> for dropped food! <b>You only have one chance</b>
            </p>
        </div>

        <div id="drive-thru-board">
            
            <div id="moving-car">
                <div id="car-window"></div>
                <div id="car-body"></div>
                <div class="wheel wheel-left"></div>
                <div class="wheel wheel-right"></div>
            </div>

            <div id="food-bag">🛍️</div>

            <div id="window-frame"></div>
        </div>

        <button id="toss-btn" onclick="tossBag()">TOSS BAG!</button>

    </div>

    <script src="game.js"></script>
</body>
</html>
