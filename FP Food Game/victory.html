<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory!</title>
    <link href="https://fonts.googleapis.com/css?family=Wendy+One" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allan&family=Sanchez&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #fcfbe7;
            font-family: 'Sanchez', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .victory-container {
            text-align: center;
            background: white;
            padding: 50px;
            border: 8px solid #28a745;
            border-radius: 30px;
            box-shadow: 15px 15px 0px #1e7e34;
            max-width: 600px;
        }
        h1 {
            font-family: 'Wendy One', sans-serif;
            color: #28a745;
            font-size: 80px;
            margin: 0;
        }
        p {
            font-size: 24px;
            color: #144a7b;
            margin: 20px 0;
        }
        .code-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .code {
            background: #fceea7;
            border: 3px dashed #144a7b;
            padding: 15px 25px;
            font-family: 'Wendy One', sans-serif;
            font-size: 32px;
            color: #e5556c;
        }
        .restart-btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: #144a7b;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Wendy One', sans-serif;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="victory-container">
        <h1>VICTORY!</h1>
        <p>Congratulations! You managed your money wisely and survived the week without going broke.</p>
        <div class="code-box">
            <div class="code">CODE: SAVER2024</div>
            <div class="code">CODE: BUDGET_PRO</div>
        </div>
        <button class="restart-btn" onclick="location.href='index.html'">PLAY AGAIN</button>
    </div>
</body>
</html>
